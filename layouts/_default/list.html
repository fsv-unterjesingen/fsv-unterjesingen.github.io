{{ define "main" }}
{{ $hero := partial "funcs/hero-image.html" . }}
<section class="page-hero{{ if $hero.url }} has-hero-image{{ end }}"{{ with $hero.url }} style="--page-hero-overlay: {{ $hero.overlay }};"{{ end }}>
  {{ with $hero.url }}
  <div class="page-hero-media" aria-hidden="true">
    <img
      src="{{ $hero.fallback | safeURL }}"
      {{ with $hero.srcset }}srcset="{{ . }}"{{ end }}
      sizes="{{ $hero.sizes }}"
      alt=""
      loading="eager"
      fetchpriority="high"
      decoding="async"
    >
  </div>
  {{ end }}
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ with .Params.lead }}<p class="page-lead">{{ . }}</p>{{ end }}
  </div>
</section>
<section class="page-body">
  <div class="container content">
    {{ .Content }}
  </div>
</section>
{{ end }}
