  - slug: neunziger
    title: 'Neunziger'
    years:
      - year: 1990
        entries:
          - 'Der langjährige Ausbildungsleiter Siegfried Geiger gibt sein Amt an Jörn Eisenhardt ab. Heiner Harbusch übernimmt das Amt des technischen Leiters.'
          - 'Fluglehrer Hermann Krennmeir verunglückt tödlich.'
          - 'Einführung einer Kostenpauschale für die Segelflugausbildung.'
          - 'Verkauf der Piper PA-28 Cherokee und Kauf einer viersitzigen Motormaschine Piper PA-28 Archer II.'
          - 'Richard Bock (Ventus) und Tobias Geiger (LS 7) fliegen erstmals von Poltringen aus ein 750 km Dreieck im Segelflug.'
          - 'Fluglager in Gap'
      - year: 1991
        entries:
          - 'Birgit Metzdorf wird neue Jugendvertreterin.'
          - 'Fluglager in Gap, Gerstetten, Aubenasson und Eutingen.'
      - year: 1992
        entries:
          - 'Hans Klatt übernimmt von Familie Lukas die Betreuung des Clubheims. Christine Müller ist die neue Jugendvertreterin.'
          - 'Fluglager in Gap, Aubenasson, Farrenberg und Jena.'
      - year: 1993
        entries:
          - 'Migliederstand erstmals über 200, davon 123 Aktive.'
          - 'Verkauf der ASK 13 und Kauf des Kunststoff-Doppelsitzers DG 500.'
          - 'Renovierung des Clubheims und der Metallwerkstatt.'
          - 'Anbau einer Flugzeug-Halle (gemeinsam für die Flugsportvereine Unterjesingen und Herrenberg) an unsere Halle am Flugplatz Poltringen.'
          - 'Verlängerung der Startbahn in Poltringen mit Rollrasen.'
          - 'Tobias Geiger wird Vizemeister in der Landesmeisterschaft.'
          - 'Fluglager in Jena, Haiterbach und Potringen.'
      - year: 1994
        entries:
          - '60 Jahre FSU – gefeiert in Halle Unterjesingen mit der Taufe der DG 500 auf Hugo Gamerdinger.'
          - 'Der in 11 Jahren als Vize bewährte Richard Müller wird 1. Vorsitzender. Dr. Peter Gundlach wird zum Ehrenvorsitzenden ernannt. Karl-Heinz Hackenberg wird 2. Vorsitzender. Tommy Stolz ist neuer Jugendvertreter.'
          - 'Fluglager in Jena.'
          - 'Fliegerfest in Poltringen mit Halleneinweihung.'
          - 'Die Unterrichtsgemeinschaft THURM besteht nun 20 Jahre.'
          - 'Lackierung der Morane.'
      - year: 1995
        entries:
          - 'Fluglager in Poltringen, Kempten und Aubenasson sowie ein Motorfluglager.'
          - 'Richard Bock, Siegfried Geiger und Richard Schmid aus Altersgründen aus dem aktiven Fluglehrerdienst ausgeschieden.'
          - 'Detlef Meyerhoff löst Heiner Harbusch als Technischen Leiter ab.'
      - year: 1996
        entries:
          - 'Fluglager in Jena, Gap, Poltringen und Birrfeld und Frauenfluglager in Koblenz-Winningen.'
          - 'Tobias Geiger wird 3. bei der deutschen Meisterschaft der Clubklasse ( uns ist damit für die Europa-Meisterschaft 1997 qualifiziert).'
          - 'Verkauf der Ka 8 und Kauf einer Super-Dimona.'
          - 'Heike Rauscher löst Tommy Stolz als Jugendvertreter ab.'
      - year: 1997
        entries:
          - 'Gerd Pfeffer wird Ausbildungsleiter Motorsegler. Jörn Eisenhardt bleibt Vereinsausbildungsleiter.'
          - 'Volker Kirsch übernimmt die Koordination Segelflugzeug-Wartung.'
          - 'Fluglager in Poltringen, Kempten, Gap, Frauenfluglager (Hexen) in Eggenfelden und Motorfluglager in Ungarn.'
          - 'Hallenfest in Unterjesingen und Beteiligung am Untergassenfest und an der Kirbe.'
          - 'Verkauf Ventus bT. Neuer Ventus 2cM (Selbststarter) bestellt.'
          - 'Der langjährige 1. Vorsitzende des Flugsportvereins Ammerbuch Dr. Hans Spranger ist gestorben.'
      - year: 1998
        entries:
          - 'Richard Müller wird als 1. Vorsitzender von Dr. Joachim Ostwald abgelöst. Detlef Meyerhoff gibt das Amt des Technischen Leiters an Volker Kirsch ab. Christine Müller wird für Heike Rauscher Jugendvertreter.'
          - 'Fluglager in Poltringen, Kempten und Hexenfluglager in Rendsburg.'
          - 'Hallenfest in Unterjesingen, Fliegerfest mit Ventus-Taufe.'
          - 'Tobias Geiger wird Vize-Europameister Mannschaft Clubklasse und 2. bei der deutschen Meisterschaft.'
          - 'Der 2. Vorsitzende Karl-Heinz Hackenberg ist gestorben.'
      - year: 1999
        entries:
          - 'Roland Kehrer wird zum 2.Vorsitzenden gewählt.'
          - 'Fluglager in Poltringen, Kempten, Jena und Hexenfluglager in Ballenstedt (Ostharz).'
          - 'Hallenfest in Unterjesingen, Beteiligung am Untergassenfest und gemeinsames Abfliegen (FSV Ammerbuch).'
          - 'Dr. Joachim Ostwald / Dr. Diethard Braun belgen bei der baden-württembergischen Motorflugmeisterschaft den 4. Platz. Roland Kehrer und Martin Diebold belgen beim Allgäurundflug den 1. Platz in der Einsteigerklasse mit dem Motorsegler.'
    images:
      - file: 2015-09/d83cd95727
        title: 'Flotte des FSU'

  - slug: jahrtausend
    title: 'Jahrtausend'
    intro:
      - 'Anlässlich des 70. Geburtstags wurde eine Chronik über den Verein verfasst, inder für die einzelnen Jahre jeweils die wichtigsten Ereignisse aufgezeichnet sind.'
    years:
      - year: 2000
        entries:
          - 'Jörn Eisenhardt übergibt das Amt des Ausbildungsleiter an Robert Motzer.'
          - 'Für Christine Müller wird Achim Enzmann Jugendvertreter.'
          - 'Michael Löffler löst den langjährigen Moran-Wart Richard Schmid ab.'
          - 'Fluglager in Poltringen, Kempten und Gerstetten.'
          - 'Hexenfluglager in Rheindorf.'
          - 'Hallenfest in Unterjesingen, Fliegerfest in Poltringen, Beteiligung an der Kirbe und vereinsinternes Abfliegen.'
          - 'in der BWLV-Wertung der DMSt kommen Achim Enzmann auf den 6. Platz und Florian Ehinger auf den 13. Platz. Beim Südwestdeutschen Rundflug belegen in der Einsteigerklasse Jochen Haug / Richard Bock den 1. und Thomas Bock / Wolfgang Zanker den 2. Platz, Dr. Joachim Ostwald / Dr. Diethard Braun werden 10. bei den Wettbewerbern. Detlef Meyerhoff / Martin Diebold belegen bei der Motorflug-Landesmeisterschaft den 9. Platz.'
          - 'In den Ventus 2cM wird ein Motor eingebaut (Selbststarter).'
          - 'Zum Jahresende beendet Hans Klatt die 1990 übernommene Clubheim-Bewirtschaftung, die später Günter Bosch übernimmt.'
      - year: 2001
        entries:
          - 'Fluglager in Poltringen, Gerstetten, Kempten und ein Hexenfluglager in Bielefeld.'
          - 'Hallenfest Unterjesingen mit Fliegen im Ammertal, Beteiligung am Untergassenfest und an der Kirbe, gemeinsames Abfliegen (FSV Ammerbuch).'
          - 'Am Flugplatz stellt der FSU ein Gartenhaus auf.'
          - 'Eine der 300 Jahre alten Linden am Flugplatz wird Opfer des Sturms.'
          - 'Heike Rauscher wird nach Achim Enzmann Jugendvertreterin'
          - 'Beim Allgäuflug belegen Michael Löffler / Richard Bock den 2. Platz in der Einsteigerklasse.'
          - 'Der Verein hat eine komplette Gastronomie-Küche geschenkt bekommen, die in Stuttgart aus- und im Hallenanbau Unterjesingen eingebaut wird.'
      - year: 2002
        entries:
          - 'Erwin Oswald wird neuer Segelflug-Ausbildungsleiter. Gerd Pfeffer ist jetzt Vereinsausbildungsleiter.'
          - 'Fluglager in Poltringen, Gerstetten und Kempten sowie ein Hexenfluglager in Jena.'
          - 'Hallenfest Unterjesingen mit Einweihung der neu eingebauten Küche, Flugtag in Poltringen.'
          - 'Der Flugsportverein richtet eine eigene Homepage ein.'
          - 'Wegen der besseren Flugeigenschaften werden an der LS 7 Winglets angebracht. Von der Firma Daimler-Chrysler erhält der Verein einen Rückholwagen gespendet.'
          - 'Achim Enzmann, Florian Ehinger, Daniel Widmaier belegen den 3. Platz in der Mannschaftswertung Standardklasse (Junioren) der DMSt (BWLV-Wertung).'
          - 'Tobias Geiger (für seine neue Heimat Australien startend) belegt bei den Segelflugweltmeisterschaften in Musbach bei Freudenstadt den 17. Platz.'
      - year: 2003
        entries:
          - 'Martin Diebold wird zum neuen 2. Vorsitzenden gewählt.'
          - 'Viele Neueintritte (Segelflug und Motorsegler)'
          - 'Fluglager in Poltringen, Gerstetten und Kempten sowie ein Hexenfluglager Jena.'
          - 'Hallenfest und Untergassenfest in Unterjesingen, gemeinsames Abfliegen mit 25 Jahren Flugsportverein Ammerbuch.'
          - 'Als weiteres Segelflugzeug wird eine LS 4b (gebraucht) gekauft. Der Doppelsitzer ASK 21 ( am Boden angebunden) wurde bei einem Gewitter schwer beschädigt. Wgen der auftretenden Probleme wird der Ventus 2cM (Selbststarter) verkauft. Als Nachfolger wird eine DG 808b bestellt. Der Verkauf der bisherigen Schleppmaschine Morane und als Ersatz der Kauf einer DA 40 wird beschlossen.'
          - 'Beim Südwestdeutschen Rundflug belegen Dieter Seibold / Richard Bock den 2. Platz in der Einsteigerklasse. Dr. Joachim Ostwald / Dr. Diethard Braun belegen bei der baden-württembergieschen Motorflugmeisterschaft den 5. Platz.'
      - year: 2004
        entries:
          - '70 Jahre FSU mit Hallenfest in Unterjesingen, Fliegen im Ammertal und Flugzeugtaufe der DG 808b'
          - 'Dr. Diethard Braun hört nach 16 Jahren als Kassier auf. Neuer Kassier wird Michael Ott.'
    images:
      - file: 2015-09/38ea25be41
        title: 'DG808 beim Start im Winter'
