      - file: 2015-09/Abfahrt
        title: 'Abfahrt'
      - file: 2015-09/Doppelraab
        title: 'Doppelraab'

  - slug: sechziger
    title: 'Sechziger'
    years:
      - year: 1960
        entries:
          - 'Hermann Zanker übernimmt von Dr. Theo Huber das Amt des 1. Vorsitzenden, 2. Vorsitzender wir Willi Haug.'
          - '2. Fluglager auf dem Heufeld'
      - year: 1961
        entries:
          - 'Der FSU wird Eigentümer eines Grundstücks an der Wurmlinger Straße. Beginn der Bauarbeiten an einer Flugzeughalle mit Werkstätten und Unterrichtsraum.'
          - 'Fluglager auf dem Degerfeld'
      - year: 1962
        entries:
          - '14.7.1962: Einweihung des Neubaus und Taufe des ersten Leistungs-Einsitzers Ka 8b.'
          - 'Unter tatkräftiger Mithilfe auch ihrer Frauen haben sich die Mitglieder in 8000 Arbeitstunden ein eigenes Heim geschaffen. In der Halle und dem angebauten Festzelt wird die Jesinger Kirbe veranstaltet.'
          - 'Im Winter 1962/63 findet im Clubheim der erste Funksprechlehrgang statt.'
      - year: 1963
        entries:
          - 'Verkauf der Mü 13 E. Kauf des Schulungsdoppelsitzers Ka 7.'
          - 'Absturz des Motor-Raab mit Dr. Jochen Bark auf dem Heufeld.'
          - 'Jesinger Kirbe auf der Wiese hinter der Halle.'
      - year: 1964
        entries:
          - 'Nach der vielen Arbeit wird besonders intensiv geflogen: 796 Starts mit 197 Segelflugstunden, dazu 100 Flugstunden auf der Piper PA 18 Super Cub.'
      - year: 1965
        entries:
          - 'Erstes Fluglager in Aubenasson / Südfrankreich, von da an jährliche Wiederholung bis 1970.'
      - year: 1966
        entries:
          - 'Verspätete Feier des 30-jährigen Vereinsjubiläums mit ebenso verspäteter Taufe der Ka 7 und der neuerworbenen Ka 6 CR ( Hochleistungseinsitzer).'
      - year: 1967
        entries:
          - 'Übernahme der Piper PA 18 Super Cub D-EBYK in Vereinseigentum.'
          - 'Höhenflüge in Fayence und Innsbruck.'
      - year: 1968
        entries:
          - 'Die Ka 7 wird ersetzt durch den Schulungsdoppelsitzer ASK 13.'
          - 'Veranstaltung der Jesinger Kirbe.'
      - year: 1969
        entries:
          - 'Die Ka 6 Cr wird ersetzt durch eine Ka 6 E.'
          - 'Zum ersten Mal mehr als 1000 Segelflugstarts in einem Jahr.'
    images:
      - file: 2015-09/73cd5e36cd
        title: 'Fliegen im Ammertal'
