        title: 'Piper Super Cup'

  - slug: achtziger
    title: 'Achtziger'
    years:
      - year: 1980
        entries:
          - 'Anstelle der Piper PA 18 Super Cub wird eine viersitzige Morane 180 TS erworben.'
          - 'Beginn der Arbeiten zum Bau einer neuen Winde III.'
          - 'Fluglager in Gap.'
      - year: 1981
        entries:
          - 'Fluglager in Gerstetten / Ostalb.'
      - year: 1982
        entries:
          - 'Dr. Theo Huber, Ehrenvorsitzender unseres Vereins, ist gestorben.'
          - 'Anstelle des Jeans Astir wird eine LS 4 erworben.'
          - 'Fluglager in Aubenasson.'
      - year: 1983
        entries:
          - 'Vorstandwechsel bei der Jahreshauptversammlung im März: 1. Vorsitzender wird Herbert Keller. 2. Vorsitzender Richard Müller. Willi Haug wird nach 10 Jahren als 2. und weiteren 10 Jahren als 1. Vorsitzender zum Ehrenvorsitzenden ernannt.'
          - 'Nach mehr als 30jähriger Tätigkeit als Ausbildungsleiter des Vereins gibt Richard Bock dieses Amt an Siegfried Geiger ab.'
          - 'Verkauf des Segelflugzeugs Standart Cirrus und der Winde II.'
          - 'Fluglager in Gerstetten.'
      - year: 1984
        entries:
          - '50jähriges Vereinsjubiläum in Unterjesingen mit Flugzeugtaufe (Ventus).'
          - 'Die 1980 begonnene Schleppwinde III mit Doppeltrommel wird fertiggestellt.'
          - 'Erwerb des Hochleistungsseglers Ventus mit veränderbarer Spannweite. Kauf eines Motors für den Ventus (Spenden).'
          - 'Fluglager am Egelsee / Deckenpfronn und in Aubenasson.'
      - year: 1985
        entries:
          - 'Kauf einer Ausrüstung für Bannerschlepp. Anhänger von Daimler-Benz wird als Startwagen aufgerüstet.'
          - 'Thomas Bock löst Fritz Rauscher als technischer Leiter ab.'
          - 'Fluglager Farrenberg und Gerstetten.'
      - year: 1986
        entries:
          - 'Dr. Peter Gundlach wird neuer 1. Vorsitzender'
          - 'Der Ehrenvorsitzende Willi Haug kommt bei einem Verkehrsunfall ums Leben.'
          - 'Anschaffung des Kunststoff-Doppelsitzers ASK 21.'
          - 'Fluglager in Aubenasson und Eutingen.'
      - year: 1987
        entries:
          - 'Das Gründungsmitglied Wilhelm Seibold ist gestorben.'
          - 'Projektwoche Segelflug mit 30 Tübinger Gymnasiasten.'
          - 'Stiftung des Hermann-Zanker-Gedächtnis-Pokals und Verleihung für 1987 an den langjährigen Motorflugzeugwart Walter Köhler.'
          - 'Flugplatz-Skistaffellauf in Untermusbach: Unter 200 Teilnehmern stellen die Unterjesinger die Sieger in der Herren-, Damen-, und Jugendstaffel.'
          - 'Höhepunkt des mit regelmäßiger Folge stattfindenden Tags der offenen Tür auf dem Flugplatz Poltringen ist ein Airbus-Überflug.'
          - 'Fritz Rauscher wird wieder technischer Leiter.'
          - 'Fluglager in Aubenasson.'
      - year: 1988
        entries:
          - 'Nach einem Motorsegler-Unfall mit Sachschaden wird ein leistungsstärkerer Motorsegler SF25 C2000 angeschafft.'
          - 'Dr. Diethard Braun löst Joachim Ostwald als Kassier ab. Rene Rau tritt als Jugendvertreter die Nachfolge von Tobias Geiger an.'
          - 'Anlegung des Landefeld Ost und Einrichtung einer Tankstelle am Flugplatz Poltringen.'
          - 'Tobias Geiger wird 3. der Deutschen Meisterschaft im Streckensegelflug Standardklasse Junioren.'
          - 'Fluglager in Aubenasson un Eutingen.'
      - year: 1989
        entries:
          - 'Kauf eines Segelflugzeugs LS 7.'
          - 'Die Piloten Dr. Joachim Ostwald / Dr. Diethard Braun belegen beim Deutschlandflug den 1. Platz in der Einsteigerklasse.'
          - 'Water Köhler macht am 14.7 in Aubenasson (als 70-Jähriger) einen 10-Stunden-Dauerflug mit dem Astir.'
          - 'Fluglager in Gerstetten und Aubenasson.'
          - 'Erstmals waren die Segelflieger mehr als 1000 Stunden (Jahressumme) in der Luft.'
    images:
