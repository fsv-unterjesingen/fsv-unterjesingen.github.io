        title: 'Sprechfunk'
      - file: 2015-09/43b8a6a2bf
        title: 'Fluglager'
      - file: 2015-09/Hallenbau
        title: 'Hallenbau'

  - slug: siebziger
    title: 'Siebziger'
    years:
      - year: 1970
        entries:
          - 'Teilnahme an der Internationalen Segelflugwoche in Bozen (ebenso 1971).'
      - year: 1971
        entries:
          - 'Fluglager in Sterzing / Südtirol.'
          - 'In diesem Jahr 1602 Starts auf Segelflugzeugen! Diese Zahl wird in den nächsten 15 Jahren nicht mehr erreicht werden.'
          - 'Erich Baudermann wird 2. Vorsitzender.'
      - year: 1972
        entries:
          - 'Flugzeughallenbau Flugplatz Poltringen.'
          - 'Die Piper PA 28 Cherokee wird Vereinseigentum.'
          - 'Fluglager in Lienz / Osttirol.'
      - year: 1973
        entries:
          - 'Willi Haup wird zum 1. Vorsitzenden gewählt.'
          - 'Anschaffung des ersten Kunststoff-Hochleistungs-Segelflugzeugs Standart Cirrus und damit Beginn des Kunststoffzeitalters im FSU.'
          - 'Fluglager in Gap / Südfrankreich.'
          - 'Veranstaltung der Jesinger Kirbe.'
      - year: 1974
        entries:
          - 'Unser Manne Hermann Zanker ist gestorben.'
          - 'Anschaffung des Motorseglers SF25C Falke.'
          - 'Fluglager in Barcelonette / Südfrankreich.'
      - year: 1975
        entries:
          - 'Fluglager in Scharnstein / Österreich.'
      - year: 1976
        entries:
          - 'Höhenflüge in Fayence und St. Auban / Südfrankreich sowie in Schanis / Schweiz.'
      - year: 1977
        entries:
          - 'Anschaffung des Hochleistungs-Segelflugzeugs Astir CS.'
          - 'Fluglager wieder in Gap / Südfrankreich.'
          - 'Weitere Höhenflüge in Fayence und Innsbruck.'
      - year: 1978
        entries:
          - 'Die Ka 6 E wird verkauft und durch den Jeans-Astir ersetzt.'
          - 'Fluglager in Gap'
          - 'Die Flugsportvereine Herrenberg und Unterjesingen gründen nach langjähriger Zusammenarbeit den Flugsportverein Ammerbuch mit dem Zweck, den Sonderlandeplatz Poltringen gemeinsam zu betreiben.'
      - year: 1979
        entries:
          - 'Hugo Gamerdinger, Gründer und Ehrenmitglied unseres Vereins, ist gestorben.'
          - 'Der Motorsegler wird durch ein neueres Modell mit Zweibeinfahrwerk ersetzt.'
          - 'Fluglager in Gap.'
    images:
      - file: 2015-09/94a1ab45f9
        title: 'Halle des FSU'
